name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies and Buildozer
      run: |
        sudo apt-get update
        # إضافة مكتبات التوافق (32-bit) لدعم أدوات الـ SDK مثل AIDL
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses6 libncursesw6 libtinfo6 cmake libffi-dev libssl-dev lib32z1 lib32ncurses6 lib32stdc++6
        pip install --user --upgrade buildozer Cython virtualenv
        export PATH=$PATH:~/.local/bin
        # أمر البناء
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Baraka_App_APK
        path: bin/*.apk
