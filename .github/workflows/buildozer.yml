name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Build APK
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --user --upgrade buildozer Cython virtualenv
        export PATH=$PATH:~/.local/bin
        buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Baraka_App_APK
        path: bin/*.apk
